services:
  backend:
    build:
      context: ./backend
    command: ["bash", "/app/scripts/start.sh"]
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./var/log/backend:/var/log/securewallet
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wallet}
      POSTGRES_USER: ${POSTGRES_USER:-wallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet} -d ${POSTGRES_DB:-wallet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: "redis:latest"
    expose:
      - 6379
    working_dir: /data
    volumes:
      - redis_data:/data
    restart: "on-failure"
    container_name: wallet_redis

  wazuh.manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION:-4.14.5}
    hostname: wazuh.manager
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    environment:
      INDEXER_URL: https://wazuh.indexer:9200
      INDEXER_USERNAME: ${WAZUH_INDEXER_USERNAME:-admin}
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: ${WAZUH_API_USERNAME:-wazuh-wui}
      API_PASSWORD: ${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
    ports:
      - "127.0.0.1:${WAZUH_API_PORT:-55000}:55000"
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
      - ./monitoring/wazuh/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./monitoring/wazuh/config/wazuh_cluster/local_rules.xml:/wazuh-config-mount/etc/rules/local_rules.xml:ro
      - ./monitoring/wazuh/config/wazuh_cluster/local_decoder.xml:/wazuh-config-mount/etc/decoders/local_decoder.xml:ro
    depends_on:
      wazuh.indexer:
        condition: service_healthy

  wazuh.indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION:-4.14.5}
    hostname: wazuh.indexer
    environment:
      OPENSEARCH_JAVA_OPTS: -Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:${WAZUH_INDEXER_PORT:-9200}:9200"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml:ro
      - ./monitoring/wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:ro
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sk -u ${WAZUH_INDEXER_USERNAME:-admin}:${WAZUH_INDEXER_PASSWORD:-SecretPassword} https://localhost:9200 >/dev/null
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION:-4.14.5}
    hostname: wazuh.dashboard
    environment:
      INDEXER_USERNAME: ${WAZUH_INDEXER_USERNAME:-admin}
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      WAZUH_API_URL: https://wazuh.manager
      DASHBOARD_USERNAME: ${WAZUH_DASHBOARD_USERNAME:-kibanaserver}
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD:-kibanaserver}
      API_USERNAME: ${WAZUH_API_USERNAME:-wazuh-wui}
      API_PASSWORD: ${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
    ports:
      - "127.0.0.1:${WAZUH_DASHBOARD_PORT:-8443}:5601"
    volumes:
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./monitoring/wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./monitoring/wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./monitoring/wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh.indexer:
        condition: service_healthy
      wazuh.manager:
        condition: service_started

  wazuh.agent:
    build:
      context: ./monitoring/wazuh/agent
      args:
        WAZUH_VERSION: ${WAZUH_VERSION:-4.14.5}
    hostname: ${WAZUH_AGENT_NAME:-securewallet-host}
    privileged: true
    pid: host
    environment:
      WAZUH_MANAGER_SERVER: wazuh.manager
    volumes:
      - ./monitoring/wazuh/config/wazuh_agent/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - wazuh_agent_state:/var/ossec
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/hostfs/var/lib/docker/containers:ro
      - /var/log:/hostfs/var/log:ro
      - /etc:/hostfs/etc:ro
      - /usr/bin:/hostfs/usr/bin:ro
      - /usr/sbin:/hostfs/usr/sbin:ro
      - /bin:/hostfs/bin:ro
      - /sbin:/hostfs/sbin:ro
      - /boot:/hostfs/boot:ro
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - .:/hostfs/workspace:ro
    depends_on:
      wazuh.manager:
        condition: service_started


volumes:
  postgres_data:
  redis_data:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
  wazuh_dashboard_config:
  wazuh_dashboard_custom:
  wazuh_agent_state:
